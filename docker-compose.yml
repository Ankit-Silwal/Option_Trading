version: "3.9"
services:
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: OPTION_TRADING
      POSTGRES_PASSWORD: OPTION_TRADING
      POSTGRES_DB: OPTION_TRADING
    ports:
      - "5433:5432"